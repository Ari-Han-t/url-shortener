<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-content">
            <h1 class="logo">Short.<span>io</span></h1>
            <button id="logoutBtn" class="btn-secondary hidden">Logout</button>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container">
        
        <!-- Auth Section -->
        <section id="authSection" class="glass-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your credentials to access your dashboard.</p>
            
            <div class="tabs">
                <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab" onclick="switchAuthTab('register')">Register</button>
            </div>

            <form id="authForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="john_doe">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary w-full" id="authSubmitBtn">Login</button>
            </form>
            <p id="authError" class="error-msg"></p>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboardSection" class="hidden">
            <!-- Analytics Summary -->
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <h3>Total Network Clicks</h3>
                    <p id="totalClicks" class="stat-number">0</p>
                </div>
                <div class="glass-card stat-card">
                    <h3>Active Links</h3>
                    <p id="totalLinks" class="stat-number">0</p>
                </div>
            </div>

            <!-- Shorten Link Tool -->
            <div class="glass-card mt-6">
                <h2>Shorten a Link</h2>
                <form id="shortenForm" class="shorten-grid">
                    <input type="url" id="longUrl" required placeholder="https://very-long-url.com/xyz">
                    <input type="text" id="customAlias" placeholder="Custom alias (optional)">
                    <button type="submit" class="btn-primary">Shorten</button>
                </form>
                <p id="shortenError" class="error-msg"></p>
                
                <div id="shortenResult" class="hidden result-box">
                    <p>Your short link is ready:</p>
                    <a href="#" id="resultLink" target="_blank"></a>
                </div>
            </div>

            <!-- Links Table -->
            <div class="glass-card mt-6 table-container">
                <h2>Your Links</h2>
                <table class="links-table">
                    <thead>
                        <tr>
                            <th>Short ID</th>
                            <th>Original URL</th>
                            <th>Clicks</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>
        
    </main>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal hidden">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeQrModal()">&times;</span>
            <h2>QR Code</h2>
            <div class="qr-wrapper">
                <img id="qrImage" src="" alt="QR Code">
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
